<!--
  SteemBiota — Immutable Evolution
  Vue 3 + Vue Router 4 + steem-js + Steem Keychain SPA
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SteemBiota — Immutable Evolution</title>

  <!-- steem-js -->
  <script src="https://cdn.jsdelivr.net/npm/@steemit/steem-js@0.8.0/dist/steem.min.js"></script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Vue Router 4 -->
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>


  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: monospace;
      text-align: center;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 0;
    }

    h1 { margin: 20px 0 8px; font-size: 1.6rem; }

    button {
      padding: 8px 14px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background-color: #2e7d32;
      color: white;
      font-size: 14px;
      font-family: monospace;
    }
    button:hover    { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    input[type="text"] {
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      font-size: 14px;
      background: #222;
      color: #eee;
      font-family: monospace;
    }

    hr { margin: 24px 0; border: none; border-top: 1px solid #333; }

    canvas {
      background: #222;
      margin: 16px auto;
      display: block;
    }

    pre {
      background: #000;
      padding: 15px;
      display: inline-block;
      text-align: left;
      border-radius: 6px;
      color: #afa;
      font-size: 13px;
      line-height: 1.3;
    }

    nav { margin: 6px 0 4px; }
    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #66bb6a;
      font-weight: bold;
    }
    nav a:hover { text-decoration: underline; }
    .nav-active  { text-decoration: underline !important; color: #a5d6a7 !important; }

    .notification {
      margin: 10px auto;
      padding: 10px 14px;
      border-radius: 6px;
      max-width: 640px;
      font-size: 14px;
    }
    .notification.error   { background: #3b0000; border: 1px solid #b71c1c; color: #ff8a80; }
    .notification.success { background: #1b2e1b; border: 1px solid #388e3c; color: #a5d6a7; }
    .notification.info    { background: #0d1a2e; border: 1px solid #1565c0; color: #90caf9; }

    .keychain-notice {
      margin: 10px auto;
      padding: 10px;
      border: 1px solid #555;
      border-radius: 6px;
      background: #1a1a00;
      max-width: 600px;
      color: #ffe082;
    }

  /* Base SB Colors */
  :root {
    --sb-green: #a5d6a7;
    --sb-green-dark: #2e7d32;
    --sb-purple: #ce93d8;
    --sb-purple-dark: #4a148c;
    --sb-bg-dark: #0a0a0a;
    --sb-border: #222;
    --sb-text-muted: #888; /* Accessibility Fix */
  }

  /* Global Classes */
  .sb-card {
    background: #111;
    border: 1px solid var(--sb-border);
    border-radius: 10px;
    padding: 10px;
    transition: border-color 0.18s;
  }
  .sb-card:hover { border-color: var(--sb-green-dark); }
  
  .sb-btn {
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: var(--sb-text-muted);
    transition: all 0.2s;
  }
  .sb-btn-primary { background: var(--sb-green-dark); color: white; border-color: #388e3c; }
  .sb-btn-purple { background: var(--sb-purple-dark); color: var(--sb-purple); border-color: #7b1fa2; }

  .text-muted { color: var(--sb-text-muted) !important; }

  /* Responsive Nav */
  nav {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    padding: 10px;
    gap: 15px;
  }
  
  .nav-desktop { display: flex; gap: 15px; align-items: center; }
  .nav-mobile-toggle { display: none; font-size: 1.5rem; background: none; border: none; color: var(--sb-green); cursor: pointer; }

  @media (max-width: 600px) {
    .nav-mobile-toggle { display: block; }
    .nav-desktop {
      display: none;
      flex-direction: column;
      width: 100%;
      background: #000;
      padding: 20px;
      position: absolute;
      top: 60px;
      left: 0;
      z-index: 1000;
      border-bottom: 2px solid var(--sb-green-dark);
    }
    .nav-desktop.show { display: flex; }
  }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="blockchain.js"></script>
  <script src="components.js"></script>
  <script src="accessories.js"></script>
  <script src="upload.js"></script> 
  <script src="app.js"></script>
</body>
</html>
