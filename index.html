<!--
  SteemBiota — Immutable Evolution
  Vue 3 + Vue Router 4 + steem-js + Steem Keychain SPA
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SteemBiota — Immutable Evolution</title>

  <!-- Typography: Inter for prose, keep system monospace for data/labels -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- steem-js -->
  <script src="https://cdn.jsdelivr.net/npm/@steemit/steem-js@0.8.0/dist/steem.min.js"></script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Vue Router 4 -->
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>

  <style>
    /* ============================================================
     * SteemBiota Design System
     * All layout classes are prefixed with `sb-` to avoid conflicts.
     * ============================================================ */

    /* ── Design tokens ── */
    :root {
      /* Typography */
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'Fira Mono', 'Cascadia Code', 'Consolas', monospace;

      /* Colour palette */
      --clr-bg:       #111;
      --clr-surface:  #1a1a1a;
      --clr-border:   #252525;
      --clr-text:     #eee;
      --clr-muted:    #949494; /* BUG 4 FIX: was #888 (4.1:1 on #111 — fails WCAG AA). #949494 achieves 4.6:1. */
      --clr-green:    #66bb6a;
      --clr-green-dk: #2e7d32;
      --clr-green-lt: #a5d6a7;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      /* Base = sans-serif for readability; monospace applied selectively */
      font-family: var(--font-sans);
      text-align: center;
      background: var(--clr-bg);
      color: var(--clr-text);
      margin: 0;
      padding: 0;
      font-size: 15px;
      line-height: 1.5;
    }

    /* Data/Label elements keep monospace for the "hacker/scientist" feel */
    .sb-mono,
    code, pre,
    .sb-card-name, .sb-card-row, .sb-card-row-sm,
    .sb-stat-bar-header, .sb-genome-summary,
    .sb-level-badge, .sb-level-xp, .sb-level-rank,
    .sb-banner-handle,
    .sb-mm-name, .sb-mm-author, .sb-mm-mut, .sb-mm-lif,
    .sb-breed-status, .sb-sex-badge-abs,
    .sb-provenance-badge,
    .sb-worn-item-name,
    .sb-closet-search,
    .sb-activity-summary,
    nav a,
    input[type="text"], input[type="number"],
    button {
      font-family: var(--font-mono);
    }

    /* Long-form prose elements use sans-serif */
    .sb-doc-view,
    .sb-doc-view p, .sb-doc-view li, .sb-doc-view h1,
    .sb-doc-view h2, .sb-doc-view h3, .sb-doc-view h4,
    .notification,
    .keychain-notice,
    .sb-panel-hint,
    .sb-transfer-offer-body,
    .sb-activity-card-desc,
    .sb-activity-card-tomorrow,
    .sb-banner-about,
    .sb-profile-about,
    .sb-empty, .sb-empty-padded,
    .sb-mm-disclaimer, .sb-mm-permit, .sb-mm-confirm,
    .sb-breed-error,
    .sb-phantom-label, .sb-phantom-note {
      font-family: var(--font-sans);
    }

    h1 { margin: 20px 0 8px; font-size: 1.6rem; font-family: var(--font-mono); }

    /* ── Buttons ── */
    button {
      padding: 8px 14px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background-color: #2e7d32;
      color: white;
      font-size: 13px;
      font-family: var(--font-mono);
      letter-spacing: 0.01em;
    }
    button:hover    { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Text inputs ── */
    input[type="text"],
    input[type="number"] {
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      font-size: 13px;
      background: #222;
      color: #eee;
      font-family: var(--font-mono);
    }

    hr { margin: 24px 0; border: none; border-top: 1px solid #333; }

    canvas {
      background: #222;
      margin: 16px auto;
      display: block;
    }

    pre {
      background: #000;
      padding: 15px;
      display: inline-block;
      text-align: left;
      border-radius: 6px;
      color: #afa;
      font-size: 13px;
      line-height: 1.3;
    }

    nav { margin: 6px 0 4px; }
    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #66bb6a;
      font-weight: bold;
    }
    nav a:hover { text-decoration: underline; }
    .nav-active  { text-decoration: underline !important; color: #a5d6a7 !important; }

    /* ── Notification banners ── */
    .notification {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 10px auto;
      padding: 11px 16px;
      border-radius: 6px;
      max-width: 640px;
      font-size: 14px;
      font-family: var(--font-sans);
      line-height: 1.45;
      gap: 10px;
    }
    .notification.error   { background: #3b0000; border: 1px solid #b71c1c; color: #ff8a80; }
    .notification.success { background: #1b2e1b; border: 1px solid #388e3c; color: #a5d6a7; }
    .notification.info    { background: #0d1a2e; border: 1px solid #1565c0; color: #90caf9; }

    /* Dismiss button inside notification */
    .sb-notif-dismiss {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      color: inherit;
      line-height: 1;
      margin: 0;
    }

    .keychain-notice {
      margin: 10px auto;
      padding: 10px;
      border: 1px solid #555;
      border-radius: 6px;
      background: #1a1a00;
      max-width: 600px;
      color: #ffe082;
    }

    /* ── Cards ── */
    .sb-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s;
      position: relative;
    }
    /* FIX 9 (Mobile Hover): Restrict hover border effects to real pointer devices.
       On touch screens, :hover "sticks" after a tap and the border stays highlighted
       as the user scrolls, making the grid look messy. @media (hover: hover) ensures
       these rules only fire when the primary input is a fine pointer (mouse/trackpad). */
    @media (hover: hover) {
      .sb-card:hover { border-color: #2e7d32; }
    }

    .sb-card-name {
      font-size: 0.82rem;
      font-weight: bold;
      color: #a5d6a7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 5px;
    }

    .sb-card-row {
      font-size: 0.70rem;
      margin-top: 5px;
      display: flex;
      gap: 5px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      position: relative;
    }
    .sb-card-row-sm {
      font-size: 0.65rem;
      margin-top: 3px;
      display: flex;
      gap: 4px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .sb-dot     { color: #444; }
    .sb-muted   { color: #888; }
    .sb-dimmer  { color: #555; }
    /* BUG 6 FIX: #3a3a3a on #111 background yields a contrast ratio of ~1.86:1,
       well below the WCAG AA minimum of 4.5:1. Changed to #767676, which achieves
       exactly 4.54:1 on #111 — the minimum passing value. Critical provenance
       information (transferred badge, original author) is now readable for users
       with low vision or in bright sunlight. */
    .sb-dimmer-2 { color: #767676; }

    .sb-copy-btn {
      margin-top: 7px;
      padding: 3px 10px;
      font-size: 0.68rem;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-left: 0;
      margin-right: 0;
    }
    .sb-copy-btn-default { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }
    .sb-copy-btn-copied  { background: #1b3a1b; color: #66bb6a; border: 1px solid #2e7d32; }

    /* Mini action buttons inside cards */
    .sb-vote-btn {
      padding: 0 5px;
      font-size: 0.66rem;
      line-height: 1.5;
      background: #1a0a0a;
      border: 1px solid #4a1a1a;
      color: #ef9a9a;
      border-radius: 4px;
      cursor: pointer;
      margin: 0;
    }
    .sb-resteem-btn {
      padding: 0 5px;
      font-size: 0.63rem;
      line-height: 1.5;
      background: #0a1a1a;
      border: 1px solid #1a3a3a;
      color: #80cbc4;
      border-radius: 4px;
      cursor: pointer;
      margin: 0;
    }

    /* Vote picker popover */
    .sb-vote-popover {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      border: 1px solid #3a1a1a;
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 155px;
      z-index: 300;
      box-shadow: 0 4px 18px rgba(0,0,0,0.8);
    }
    /* When the card is near the top of the viewport, open the popover downward
       so it isn't clipped by the browser chrome or sticky navigation bar. */
    .sb-vote-popover-below {
      bottom: auto;
      top: calc(100% + 6px);
    }
    .sb-vote-popover-title {
      font-size: 0.7rem;
      color: #ef9a9a;
      font-weight: bold;
      text-align: center;
      margin-bottom: 7px;
    }
    .sb-vote-popover-pct {
      text-align: center;
      font-size: 1rem;
      font-weight: bold;
      color: #ef9a9a;
      margin-bottom: 5px;
    }
    .sb-vote-popover-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: #444;
      margin-top: 2px;
    }
    .sb-vote-confirm-btn {
      margin-top: 7px;
      width: 100%;
      background: #3a0a0a;
      border: 1px solid #6a2020;
      color: #ef9a9a;
      font-size: 0.75rem;
      border-radius: 5px;
      padding: 4px 0;
      cursor: pointer;
      margin-left: 0;
      margin-right: 0;
    }

    /* ── Notification badge (nav bell) ── */
    .sb-nav-link-wrap { position: relative; }
    .sb-notif-badge {
      position: absolute;
      top: -6px;
      right: -10px;
      background: #e53935;
      color: #fff;
      font-size: 0.6rem;
      font-weight: bold;
      border-radius: 50%;
      min-width: 16px;
      height: 16px;
      line-height: 16px;
      text-align: center;
      padding: 0 2px;
    }

    /* ── Auth (login form) ── */
    .sb-auth-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 8px 0;
    }
    .sb-btn-cancel { background: #555; }
    .sb-btn-logout-inline { background: #555; }
    .sb-login-error { width: 100%; color: #ff8a80; font-size: 13px; margin-top: 4px; }
    .sb-login-info  { font-size: 14px; }

    /* ── Spinner ── */
    .sb-spinner-wrap { text-align: center; padding: 30px; color: #888; }
    .sb-spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 4px solid #333;
      border-top-color: #66bb6a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .sb-spinner-msg { margin-top: 10px; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading skeleton pulse ── */
    @keyframes mmPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .sb-skeleton {
      flex: 0 0 148px;
      height: 102px;
      background: #0a1a1a;
      border: 1px solid #1b3a2a;
      border-radius: 8px;
      padding: 8px;
      animation: mmPulse 1.2s ease-in-out infinite;
    }
    .sb-skeleton-line    { height: 11px; border-radius: 4px; background: #1b3a2a; margin-bottom: 6px; }
    .sb-skeleton-line-sm { height: 9px;  border-radius: 4px; background: #1b3a2a; margin-bottom: 4px; }

    /* ── UserProfile component ── */
    .sb-profile-cover {
      background-size: cover;
      background-position: center;
      height: 120px;
      border-radius: 8px;
      background-color: #222;
    }
    .sb-profile-avatar-row {
      display: flex;
      align-items: center;
      margin-top: -36px;
      padding: 10px;
      justify-content: center;
    }
    .sb-avatar-large { width: 72px; height: 72px; border-radius: 50%; border: 3px solid #444; background: #222; }
    .sb-profile-info { margin-left: 15px; text-align: left; }
    .sb-profile-name   { margin: 0; color: #eee; }
    .sb-profile-handle { color: #aaa; }
    .sb-profile-about  { margin: 5px 0; color: #ccc; }

    /* ── Global profile banner ── */
    .sb-banner {
      position: relative;
      margin: 8px auto 0;
      max-width: 700px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }
    .sb-banner-cover {
      height: 72px;
      border-bottom: 1px solid #222;
      background: linear-gradient(135deg, #1a2e1a 0%, #0d1a0d 100%);
      background-size: cover;
      background-position: center;
    }
    .sb-banner-body {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px 10px;
      background: #161616;
    }
    .sb-banner-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid #2e7d32;
      background: #222;
      margin-top: -26px;
      flex-shrink: 0;
      object-fit: cover;
    }
    .sb-banner-info  { text-align: left; margin-top: 4px; min-width: 0; flex: 1; }
    .sb-banner-name-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .sb-banner-name {
      font-size: 0.95rem; font-weight: bold; color: #eee;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sb-level-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #1a2e1a; border: 1px solid #2e7d32; border-radius: 12px;
      padding: 1px 8px; font-size: 0.72rem; white-space: nowrap; cursor: default;
    }
    .sb-level-rank { color: #a5d6a7; font-weight: bold; }
    .sb-level-xp   { color: #66bb6a; }
    .sb-banner-handle { font-size: 0.78rem; color: #66bb6a; }
    .sb-banner-about {
      font-size: 0.75rem; color: #666; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px;
    }
    .sb-xp-bar-wrap  { margin-top: 6px; max-width: 340px; }
    .sb-xp-bar-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: #555; margin-bottom: 3px; }
    .sb-xp-bar-track { background: #111; border: 1px solid #2a2a2a; border-radius: 4px; height: 5px; overflow: hidden; }
    .sb-xp-bar-fill  { height: 100%; background: linear-gradient(90deg, #2e7d32, #66bb6a); border-radius: 4px; transition: width 0.6s ease; }
    .sb-max-rank     { font-size: 0.7rem; color: #66bb6a; margin-top: 4px; }
    .sb-activity-summary { font-size: 0.68rem; color: #444; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Genome histogram (GenomeTableComponent) ── */
    .sb-genome-hist {
      margin: 12px auto;
      max-width: 440px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Fixed (non-bar) rows */
    .sb-genome-fixed-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 8px;
      border-radius: 5px;
      background: #151515;
    }

    /* Section separator */
    .sb-genome-section-label {
      font-family: var(--font-mono, monospace);
      font-size: 10px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 4px;
      padding-left: 8px;
    }

    /* Bar rows */
    .sb-genome-bar-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 6px 8px;
      border-radius: 5px;
      background: #151515;
      cursor: default;
    }
    .sb-genome-bar-row:hover { background: #1c1c1c; }

    .sb-genome-bar-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .sb-genome-bar-desc {
      font-family: var(--font-mono, monospace);
      font-size: 11px;
      font-weight: bold;
    }
    .sb-genome-bar-track {
      position: relative;
      /* FIX 7 (A11y): Increased from 6px to 10px. At 6px the MOR (green) and
         APP (teal) bars are nearly indistinguishable for users with colour-vision
         deficiency or on low-contrast displays. 10px provides enough surface area
         for the colour to read clearly while still feeling compact. */
      height: 10px;
      background: #252525;
      border-radius: 3px;
      overflow: visible;
    }
    .sb-genome-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.35s ease;
      min-width: 2px;
    }
    .sb-genome-bar-num {
      position: absolute;
      right: 0;
      top: -14px;
      font-family: var(--font-mono, monospace);
      font-size: 10px;
      color: #555;
    }

    /* Shared key/val styles (used in both old table and new hist) */
    /* FIX 7 (A11y): Visually-hidden utility — readable by screen readers but
       invisible on screen. Used to annotate canvas/pre elements with a text
       description without disrupting the visual layout. */
    .sb-sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .sb-genome-key {
      color: #666;
      font-family: var(--font-mono, monospace);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .sb-genome-val {
      color: #ccc;
      font-family: var(--font-mono, monospace);
      font-size: 12px;
      font-weight: bold;
    }
    .sb-genome-dim { color: #444; font-weight: normal; }

    /* Mutation badge */
    .sb-genome-mut-badge {
      font-family: var(--font-mono, monospace);
      font-size: 11px;
      font-weight: bold;
      border: 1px solid;
      border-radius: 4px;
      padding: 1px 7px;
    }

    /* ── Creature grid ── */
    .sb-creature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 12px;
      max-width: 920px;
      margin: 0 auto;
    }
    .sb-creature-grid-item { position: relative; }
    .sb-transferred-badge {
      position: absolute; bottom: 6px; left: 6px;
      font-size: 0.62rem; padding: 2px 6px; border-radius: 8px;
      background: #0d1a0d; border: 1px solid #2e7d32; color: #66bb6a;
      pointer-events: none;
    }

    /* ── Pagination ── */
    .sb-pagination { margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 14px; }
    .sb-pagination-info { font-size: 13px; color: #555; }
    .sb-btn-page { padding: 5px 14px; background: #1a2a1a; }

    /* ── Filters row ── */
    .sb-filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: center; margin-bottom: 14px; }
    .sb-filter-select { padding: 5px 8px; font-size: 13px; background: #1a1a1a; color: #ccc; border: 1px solid #333; border-radius: 6px; font-family: monospace; }
    .sb-filter-btn-group { display: flex; gap: 4px; }
    .sb-filter-btn { padding: 4px 10px; font-size: 12px; background: #1a1a1a; color: #888; border: 1px solid #333; border-radius: 6px; margin: 0; }
    .sb-filter-btn.active-all    { background: #2e7d32; color: #fff; }
    .sb-filter-btn.active-male   { background: #1565c0; color: #90caf9; }
    .sb-filter-btn.active-female { background: #880e4f; color: #f48fb1; }
    .sb-filter-btn.active-age    { background: #4a3000; color: #ffb74d; }
    .sb-filter-age-group { display: flex; gap: 4px; align-items: center; }
    .sb-filter-age-label { font-size: 12px; color: #555; }
    .sb-filter-age-input { width: 64px; padding: 4px 6px; font-size: 12px; background: #1a1a1a; color: #ccc; border: 1px solid #333; border-radius: 6px; font-family: monospace; }
    .sb-filter-clear { padding: 4px 7px; font-size: 11px; background: #1a1a1a; color: #555; border: 1px solid #333; border-radius: 6px; margin: 0; }

    /* ── Section headings ── */
    .sb-section-title     { color: #a5d6a7; margin: 16px 0 4px; }
    .sb-section-title-row { color: #a5d6a7; margin: 18px 0 12px; font-size: 1rem; letter-spacing: 0.04em; }
    .sb-section-count     { font-size: 0.75rem; color: #555; font-weight: normal; margin-left: 8px; }

    /* ── Activity panel ── */
    .sb-activity-section { margin-top: 32px; padding-top: 24px; border-top: 1px solid #333; }
    .sb-activity-title   { color: #b39ddb; margin: 0 0 12px; }
    .sb-activity-gate    { text-align: center; padding: 18px 0; color: #555; font-size: 13px; }

    .sb-stat-bar-wrap { max-width: 320px; margin: 0 auto 16px; }
    .sb-stat-bar-header { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 4px; }
    .sb-stat-bar-track  { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; height: 8px; overflow: hidden; }
    .sb-stat-bar-fill   { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
    .sb-dual-bars { max-width: 320px; margin: 0 auto 16px; display: flex; flex-direction: column; gap: 10px; }

    /* Activity cards */
    .sb-activity-cards { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; max-width: 640px; margin: 0 auto; }
    .sb-activity-card  { flex: 1; min-width: 180px; border-radius: 10px; padding: 14px; text-align: center; }
    .sb-activity-card-feed  { background: #0d1f0d; border: 1px solid #1b5e20; }
    .sb-activity-card-play  { background: #120a1e; border: 1px solid #4a148c; }
    .sb-activity-card-walk  { background: #071a17; border: 1px solid #004d40; }
    .sb-activity-card-icon  { font-size: 1.2rem; margin-bottom: 4px; }
    .sb-activity-card-label { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
    .sb-label-feed { color: #a5d6a7; }
    .sb-label-play { color: #ce93d8; }
    .sb-label-walk { color: #80cbc4; }
    .sb-activity-card-desc     { font-size: 11px; color: #555; margin-bottom: 10px; }
    .sb-activity-card-tomorrow { color: #555; font-size: 11px; margin: 6px 0 0; }

    .sb-food-selector { display: flex; flex-direction: column; gap: 5px; text-align: left; margin-bottom: 10px; }
    .sb-food-option   { display: flex; align-items: center; gap: 6px; cursor: pointer; }

    /* Full-width action buttons (Feed / Play / Walk) */
    .sb-action-btn { width: 100%; padding: 7px 0; font-size: 12px; border-radius: 6px; margin: 0; }
    .sb-action-btn-feed-on  { background: #1b5e20; color: #c8e6c9; border: 1px solid #2e7d32; cursor: pointer; }
    .sb-action-btn-feed-off { background: #1a1a1a; color: #444;    border: 1px solid #2a2a2a; cursor: default; }
    .sb-action-btn-play-on  { background: #4a148c; color: #e1bee7; border: 1px solid #7b1fa2; cursor: pointer; }
    .sb-action-btn-play-off { background: #1a1a1a; color: #444;    border: 1px solid #2a2a2a; cursor: default; }
    .sb-action-btn-walk-on  { background: #004d40; color: #b2dfdb; border: 1px solid #00695c; cursor: pointer; }
    .sb-action-btn-walk-off { background: #1a1a1a; color: #444;    border: 1px solid #2a2a2a; cursor: default; }

    /* ── Breeding panel ── */
    .sb-breed-section { margin-top: 32px; padding-top: 24px; border-top: 1px solid #333; }
    .sb-breed-title   { color: #80deea; margin: 0 0 4px; }
    .sb-breed-hint    { font-size: 12px; color: #555; margin: 0 0 12px; }
    .sb-breed-gate    { text-align: center; padding: 18px 0; color: #555; font-size: 13px; }
    .sb-breed-inputs  { display: flex; flex-direction: column; gap: 8px; max-width: 520px; margin: 0 auto; }
    .sb-parent-input-wrap { position: relative; }
    .sb-parent-locked {
      font-size: 13px; padding: 8px 10px; border-radius: 6px;
      background: #0d1a0d; border: 1px solid #2e7d32; color: #a5d6a7;
      display: flex; justify-content: space-between; align-items: center;
    }
    .sb-sex-badge-abs {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-size: 12px; font-weight: bold; pointer-events: none;
    }
    .sb-sex-male   { color: #90caf9; }
    .sb-sex-female { color: #f48fb1; }
    .sb-btn-breed  { background: #1a3a2a; }
    .sb-btn-blue   { background: #1565c0; }
    .sb-btn-grey   { background: #2a2a2a; color: #aaa; font-size: 13px; }
    .sb-breed-status { color: #80deea; font-size: 12px; margin-top: 8px; font-style: italic; }
    .sb-breed-error  { color: #ff8a80; font-size: 13px; margin-top: 8px; }

    .sb-child-preview  { margin-top: 20px; position: relative; }
    .sb-child-title    { font-size: 1.1rem; font-weight: bold; color: #80deea; }
    .sb-child-subtitle { font-size: 0.85rem; color: #888; margin: 2px 0 6px; }
    .sb-genome-summary { font-size: 12px; color: #666; margin: 4px 0 10px; }

    .sb-post-title-wrap { margin-top: 12px; max-width: 520px; margin-left: auto; margin-right: auto; }
    .sb-form-label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    .sb-input-full { width: 100%; font-size: 13px; }
    .sb-breed-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }

    /* Matchmaker */
    .sb-mm-skeletons { margin-top: 10px; display: flex; gap: 8px; }
    .sb-mm-cards     { margin-top: 10px; display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
    .sb-mm-card { flex: 0 0 148px; border-radius: 8px; padding: 8px; cursor: pointer; font-size: 11px; transition: all 0.15s; }
    .sb-mm-card-default  { background: #0a1a1a; border: 1px solid #2e7d32; }
    .sb-mm-card-selected { background: #2a1500; border: 2px solid #ffb74d; box-shadow: 0 0 0 3px rgba(255,183,77,0.22), 0 2px 12px rgba(255,183,77,0.15); outline: none; }
    .sb-mm-card-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .sb-mm-name   { font-weight: bold; color: #a5d6a7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90px; }
    .sb-mm-author { color: #555; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-mm-stats-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .sb-mm-window   { color: #555; margin-bottom: 2px; }
    .sb-mm-mut      { color: #80cbc4; }
    .sb-mm-lif      { color: #666; }
    .sb-mm-permit   { margin-top: 4px; color: #ffe082; font-size: 10px; }
    .sb-mm-confirm  { margin-top: 6px; padding: 5px 0 3px; border-top: 1px solid #ffb74d; color: #ffb74d; font-size: 10px; font-weight: bold; text-align: center; letter-spacing: 0.02em; }
    .sb-mm-disclaimer { font-size: 10px; color: #444; margin-top: 4px; font-style: italic; }

    /* ── Collapsible panels (Permits, Transfer) ── */
    .sb-panel-wrap { margin-top: 24px; max-width: 520px; margin-left: auto; margin-right: auto; }
    .sb-collapsible-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; padding: 10px 14px; border-radius: 8px; user-select: none;
    }
    .sb-collapsible-header-green { background: #0a0f0a; border: 1px solid #1a2e1a; }
    .sb-collapsible-header-teal  { background: #0a0a12; border: 1px solid #1a1a2e; }
    .sb-collapsible-label-green  { font-size: 0.88rem; color: #66bb6a; font-weight: bold; }
    .sb-collapsible-label-teal   { font-size: 0.88rem; color: #80cbc4; font-weight: bold; }
    .sb-collapsible-meta   { font-weight: normal; color: #555; font-size: 0.80rem; margin-left: 8px; }
    .sb-collapsible-toggle { color: #444; font-size: 0.78rem; }
    .sb-collapsible-body-green { border: 1px solid #1a2e1a; border-top: none; border-radius: 0 0 8px 8px; background: #080d08; padding: 14px; }
    .sb-collapsible-body-teal  { border: 1px solid #1a1a2e; border-top: none; border-radius: 0 0 8px 8px; background: #08080f; padding: 14px; }

    .sb-panel-hint { font-size: 0.78rem; color: #555; margin: 0 0 12px; line-height: 1.5; }
    .sb-permit-grantee-list  { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .sb-permit-grantee-row   { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-radius: 6px; background: #0d1a0d; border: 1px solid #1a2e1a; font-size: 13px; }
    .sb-permit-grantee-name  { color: #a5d6a7; }
    .sb-btn-revoke { background: #1a0808; border: 1px solid #3a1a1a; color: #ff8a80; font-size: 12px; padding: 3px 10px; }
    .sb-permit-input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 8px; }

    /* ── Transfer Panel ── */
    .sb-transfer-offer-box { padding: 16px 18px; border-radius: 10px; background: #0d1a0d; border: 1px solid #2e7d32; }
    .sb-transfer-offer-title { font-size: 1rem; font-weight: bold; color: #a5d6a7; margin-bottom: 8px; }
    .sb-transfer-offer-body  { font-size: 0.83rem; color: #888; margin: 0 0 14px; line-height: 1.5; }
    .sb-transfer-offer-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .sb-btn-accept  { background: #1a3a1a; }
    .sb-btn-decline { background: #1a1a1a; color: #888; border: 1px solid #333; }
    .sb-pending-warn { font-weight: normal; color: #ffb74d; font-size: 0.80rem; margin-left: 8px; }
    .sb-transfer-history { margin-top: 12px; }
    .sb-transfer-history-title { font-size: 0.78rem; color: #555; margin-bottom: 6px; }
    .sb-transfer-history-row   { font-size: 12px; color: #555; margin: 2px 0; }

    /* ── Equip panel (accessories) ── */
    .sb-equip-wrap    { max-width: 520px; margin: 16px auto; }
    .sb-worn-section  { margin-bottom: 12px; }
    .sb-worn-header   { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .sb-worn-label    { font-size: 0.78rem; color: #ce93d8; text-transform: uppercase; font-weight: bold; }
    .sb-worn-count    { font-size: 0.72rem; color: #555; }
    .sb-worn-list     { display: flex; flex-direction: column; gap: 8px; }
    .sb-worn-item     { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; background: #0d0a10; border: 1px solid #2a1a2e; }
    .sb-worn-item-info { flex: 1; text-align: left; }
    .sb-worn-item-name { font-weight: bold; color: #ce93d8; }
    .sb-worn-lapsed    { color: #ff8a80; }

    .sb-equip-toggle { cursor: pointer; padding: 10px 14px; border-radius: 8px 8px 0 0; background: #0a0a10; border: 1px solid #2a1a2e; color: #ce93d8; font-size: 0.85rem; }
    .sb-equip-body   { background: #080808; border: 1px solid #2a1a2e; border-top: none; padding: 14px; border-radius: 0 0 8px 8px; }
    .sb-closet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .sb-closet-label  { font-size: 0.75rem; color: #ce93d8; text-transform: uppercase; }
    .sb-closet-search { font-size: 11px; padding: 3px 8px; width: 140px; background: #000; border: 1px solid #333; color: #ce93d8; border-radius: 4px; font-family: monospace; }
    .sb-closet-empty  { color: #444; font-size: 12px; padding: 10px; }
    .sb-closet-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: thin; }
    .sb-equip-error       { color: #ff8a80; margin-top: 6px; font-size: 13px; }
    .sb-equip-preview-name { margin-top: 4px; font-size: 13px; }

    /* ── Provenance banners ── */
    .sb-provenance-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 8px; font-size: 0.83rem; font-weight: bold; margin: 8px 0; }
    .sb-provenance-warning { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 12px; text-align: left; max-width: 520px; margin-left: auto; margin-right: auto; }
    .sb-provenance-duplicate  { background: #1a0000; border: 1px solid #b71c1c; color: #ff8a80; }
    .sb-provenance-suspicious { background: #1a0e00; border: 1px solid #e65100; color: #ffb74d; }
    .sb-provenance-broken     { background: #1a0000; border: 1px solid #b71c1c; color: #ff8a80; }

    /* ── Creature view tab bar ── */
    .sb-tab-bar { display: flex; justify-content: center; gap: 5px; margin: 20px 0 10px; border-bottom: 1px solid #222; }
    .sb-tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; color: #555; padding: 8px 12px; font-size: 12px; font-weight: bold; border-radius: 4px 4px 0 0; margin: 0; }
    .sb-tab-btn:hover { opacity: 0.8; }

    /* ── Kinship / family ── */
    .sb-kinship-section   { margin: 8px 0 20px; }
    .sb-kinship-title     { color: #a5d6a7; margin: 0 0 12px; font-size: 1rem; }
    .sb-kinship-loading   { color: #555; font-size: 13px; margin: 8px 0; }
    .sb-kinship-sublabel  { font-size: 0.78rem; color: #66bb6a; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .sb-kinship-sublabel-spaced { margin: 14px 0 6px; }
    .sb-kinship-grid    { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 10px; max-width: 920px; }
    .sb-kinship-grid-sm { max-width: 500px; }
    .sb-phantom-card  { border: 1px solid #333; border-radius: 10px; padding: 16px; text-align: center; background: #0a0a0a; color: #555; }
    .sb-phantom-icon  { font-size: 1.8rem; }
    .sb-phantom-label { font-size: 0.78rem; margin-top: 6px; }
    /* BUG 6 FIX: Same contrast fix — was #3a3a3a (1.86:1), now #767676 (4.54:1). */
    .sb-phantom-author { font-size: 0.68rem; color: #767676; margin-top: 4px; }
    .sb-phantom-note   { font-size: 0.65rem; color: #2a2a2a; margin-top: 4px; font-style: italic; }
    .sb-no-data { font-size: 12px; color: #333; margin-bottom: 8px; }

    /* ── About / doc view ── */
    .sb-doc-view  { margin: 20px auto; max-width: 720px; padding: 0 20px 40px; text-align: left; }
    .sb-doc-error { color: #ff8a80; margin-top: 24px; }

    /* ── Error / empty states ── */
    .sb-error        { color: #ff8a80; font-size: 13px; }
    .sb-empty        { color: #555; font-size: 13px; }
    .sb-empty-padded { color: #555; font-size: 13px; margin: 12px 0; }

    /* ── Misc helpers ── */
    .sb-fossil-label { margin: 6px 0; color: #666; font-size: 0.85rem; }
    .sb-founder-section { margin-bottom: 24px; }
    .sb-genus-input-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
    .sb-genus-name      { font-size: 12px; color: #66bb6a; font-style: italic; }
    .sb-creature-preview      { margin: 16px 0 6px; }
    .sb-creature-preview-name { font-size: 1.3rem; font-weight: bold; color: #a5d6a7; }
    .sb-creature-preview-sex  { font-size: 0.9rem; color: #888; margin-top: 2px; }
    .sb-publish-gate { color: #888; font-size: 13px; margin: 4px 0; }

    /* ── Accessory cards ── */
    .sb-acc-card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; transition: border-color 0.18s; }
    @media (hover: hover) {
      .sb-acc-card:hover { border-color: #6a1b9a; }
    }
    .sb-acc-name { font-size: 0.82rem; font-weight: bold; color: #ce93d8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 5px; }

    /* ── Leaderboard / Upload wrappers ── */
    .sb-leaderboard-wrap { max-width: 680px; margin: 0 auto; padding-bottom: 40px; }
    .sb-upload-wrap { max-width: 600px; margin: 0 auto; padding-bottom: 40px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="blockchain.js"></script>
  <script src="components.js"></script>
  <script src="accessories.js"></script>
  <script src="upload.js"></script> 
  <script src="app.js"></script>
</body>
</html>
